<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooking Tycoon - Restaurant Empire</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #FFB347 0%, #FF8C69 50%, #FFB347 100%);
            min-height: 100vh;
            padding: 10px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: linear-gradient(180deg, #FFF8DC 0%, #FFEAA7 100%);
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            border: 5px solid #FF6B6B;
        }

        header {
            background: linear-gradient(135deg, #FF8C69 0%, #FF6B6B 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid #FFB347;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.3);
            font-weight: bold;
        }

        .header-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .stat {
            font-size: 1.1em;
            background: rgba(255,255,255,0.3);
            padding: 12px 18px;
            border-radius: 12px;
            border: 2px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .stat-label {
            opacity: 0.95;
            font-size: 0.85em;
            font-weight: bold;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.4em;
            margin-top: 5px;
        }

        main {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            padding: 15px;
        }

        .kitchen-area {
            grid-column: 1;
            grid-row: 1 / 3;
        }

        .section {
            background: linear-gradient(135deg, #FFF8DC 0%, #FFEAA7 100%);
            border: 4px solid #FF6B6B;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            margin-bottom: 15px;
        }

        .section h2 {
            color: #FF6B6B;
            margin-bottom: 15px;
            font-size: 1.8em;
            border-bottom: 3px solid #FFB347;
            padding-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .cooking-display {
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            border: 4px solid #654321;
            border-radius: 15px;
            padding: 20px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            color: white;
        }

        .cooking-counter {
            font-size: 4em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .current-dish-display {
            font-size: 1.5em;
            margin: 10px 0;
            text-align: center;
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            min-width: 200px;
        }

        .dish-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .dish {
            background: linear-gradient(135deg, #FFE4B5 0%, #FFD699 100%);
            border: 3px solid #FF8C69;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .dish:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border-color: #FF6B6B;
        }

        .dish:active {
            transform: translateY(-2px);
        }

        .dish-emoji {
            font-size: 2.5em;
            margin: 5px 0;
        }

        .dish-name {
            font-weight: bold;
            font-size: 0.95em;
            color: #333;
            margin-bottom: 3px;
        }

        .dish-profit {
            color: #27ae60;
            font-size: 0.85em;
            font-weight: bold;
        }

        .customers-section {
            background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);
            border: 4px solid #4CAF50;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .customers-section h3 {
            color: #4CAF50;
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .customer {
            background: white;
            border: 2px solid #4CAF50;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .customer-info {
            flex: 1;
        }

        .customer-name {
            font-weight: bold;
            margin-bottom: 3px;
            font-size: 0.95em;
        }

        .customer-order {
            font-size: 0.85em;
            color: #666;
        }

        .customer-wait {
            font-size: 0.75em;
            color: #999;
            margin-top: 3px;
        }

        .serve-btn {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
            transition: all 0.2s ease;
            font-size: 0.9em;
        }

        .serve-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .serve-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .upgrades-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .upgrade-item {
            background: linear-gradient(135deg, #E1BEE7 0%, #F3E5F5 100%);
            border: 3px solid #9C27B0;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .upgrade-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(156, 39, 176, 0.3);
        }

        .upgrade-item.purchased {
            background: linear-gradient(135deg, #C8E6C9 0%, #E8F5E9 100%);
            border-color: #27ae60;
        }

        .upgrade-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 3px;
            font-size: 0.95em;
        }

        .upgrade-cost {
            color: #E74C3C;
            font-size: 0.85em;
            font-weight: bold;
        }

        .upgrade-status {
            color: #27ae60;
            font-size: 0.8em;
            font-weight: bold;
            margin-top: 3px;
        }

        .building {
            background: linear-gradient(135deg, #FFE0B2 0%, #FFCC80 100%);
            border: 3px solid #FF9800;
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .building:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(255, 152, 0, 0.3);
        }

        .building.owned {
            background: linear-gradient(135deg, #C8E6C9 0%, #E8F5E9 100%);
            border-color: #27ae60;
        }

        .building-name {
            font-weight: bold;
            font-size: 1em;
            color: #333;
            margin-bottom: 3px;
        }

        .building-info {
            font-size: 0.8em;
            color: #666;
            margin: 3px 0;
        }

        .building-cost {
            color: #E74C3C;
            font-weight: bold;
            margin-top: 3px;
            font-size: 0.85em;
        }

        .building-owned {
            color: #27ae60;
            font-weight: bold;
            margin-top: 3px;
            font-size: 0.85em;
        }

        .right-panel {
            display: grid;
            grid-template-rows: auto auto;
            gap: 15px;
        }

        .footer {
            background: linear-gradient(135deg, #FF8C69 0%, #FF6B6B 100%);
            padding: 12px 20px;
            text-align: center;
            border-top: 4px solid #FFB347;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .save-btn, .load-btn {
            background: white;
            color: #FF6B6B;
            border: 3px solid white;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            font-size: 0.95em;
        }

        .save-btn:hover, .load-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            animation: slideIn 0.3s ease;
            z-index: 1000;
            font-weight: bold;
            border: 2px solid white;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .profit-indicator {
            position: fixed;
            pointer-events: none;
            font-weight: bold;
            font-size: 1.5em;
            animation: floatUp 1.5s ease forwards;
        }

        @keyframes floatUp {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-80px);
            }
        }

        @media (max-width: 1024px) {
            main {
                grid-template-columns: 1fr;
            }

            .kitchen-area {
                grid-column: 1;
                grid-row: auto;
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .cooking-display {
                min-height: 200px;
            }

            .cooking-counter {
                font-size: 2.5em;
            }

            .dish-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍳 COOKING TYCOON 🍳</h1>
            <p style="font-size: 1.2em; margin-bottom: 15px;">Build Your Restaurant Empire!</p>
            <div class="header-stats">
                <div class="stat">
                    <div class="stat-label">💰 MONEY</div>
                    <div class="stat-value">$<span id="money">0</span></div>
                </div>
                <div class="stat">
                    <div class="stat-label">⭐ LEVEL</div>
                    <div class="stat-value"><span id="level">1</span></div>
                </div>
                <div class="stat">
                    <div class="stat-label">👥 CUSTOMERS</div>
                    <div class="stat-value"><span id="waiting-customers">0</span></div>
                </div>
                <div class="stat">
                    <div class="stat-label">📊 INCOME/SEC</div>
                    <div class="stat-value">$<span id="income-per-sec">0</span></div>
                </div>
            </div>
        </header>

        <main>
            <div class="kitchen-area">
                <section class="section">
                    <h2>👨‍🍳 COOKING STATION</h2>
                    <div class="cooking-display">
                        <div class="cooking-counter" id="cooking-display">🍽️</div>
                        <div class="current-dish-display" id="current-dish-display">Click a dish to cook!</div>
                    </div>
                    <div class="dish-list" id="dish-list"></div>
                    <div style="margin-top: 15px; text-align: center;">
                        <button id="unlock-recipe-btn" class="serve-btn" style="background: linear-gradient(135deg, #9C27B0 0%, #7B1FA2 100%); padding: 12px 24px; font-size: 1em; width: 100%;">
                            📚 UNLOCK NEW RECIPE - Level Up!
                        </button>
                    </div>
                </section>

                <section class="section customers-section">
                    <h3>👥 WAITING CUSTOMERS</h3>
                    <div id="customers-list" style="max-height: 250px; overflow-y: auto;"></div>
                </section>
            </div>

            <div class="right-panel">
                <section class="section">
                    <h2>⚡ UPGRADES</h2>
                    <div class="upgrades-grid" id="upgrades-list"></div>
                </section>

                <section class="section">
                    <h2>🏢 RESTAURANTS</h2>
                    <div id="buildings-list"></div>
                </section>
            </div>
        </main>

        <div class="footer">
            <button class="save-btn" id="save-btn">💾 SAVE GAME</button>
            <button class="load-btn" id="load-btn">📂 LOAD GAME</button>
        </div>
    </div>

    <script>
        // Game State
        const gameState = {
            money: 0,
            level: 1,
            totalEarned: 0,
            dishesCookedCount: 0,
            playTimeSeconds: 0,
            customersSatisfied: 0,
            dishes: [
                { id: 1, name: 'Burger', emoji: '🍔', basePrice: 5, baseCost: 2, unlockedAt: 1 },
                { id: 2, name: 'Pizza', emoji: '🍕', basePrice: 8, baseCost: 3, unlockedAt: 2 },
                { id: 3, name: 'Ramen', emoji: '🍜', basePrice: 10, baseCost: 4, unlockedAt: 3 },
                { id: 4, name: 'Steak', emoji: '🥩', basePrice: 15, baseCost: 6, unlockedAt: 4 },
                { id: 5, name: 'Sushi', emoji: '🍣', basePrice: 20, baseCost: 8, unlockedAt: 5 },
                { id: 6, name: 'Lobster', emoji: '🦞', basePrice: 30, baseCost: 12, unlockedAt: 6 },
                { id: 7, name: 'Haute Cuisine', emoji: '🍽️', basePrice: 50, baseCost: 18, unlockedAt: 7 },
                { id: 8, name: 'Golden Dish', emoji: '✨', basePrice: 100, baseCost: 40, unlockedAt: 8 }
            ],
            customers: [],
            customerNames: ['👨 Alex', '👩 Emma', '👨 Jake', '👩 Sofia', '👨 Marco', '👩 Lily', '👨 Tom', '👩 Sarah', '👨 Chris', '👩 Anna'],
            upgrades: [
                { id: 1, name: 'Better Oven', cost: 100, multiplier: 1.2, type: 'price', purchased: false },
                { id: 2, name: 'Fast Hands', cost: 200, multiplier: 1.3, type: 'price', purchased: false },
                { id: 3, name: 'Spice Master', cost: 500, multiplier: 1.4, type: 'price', purchased: false },
                { id: 4, name: 'Premium Ingredients', cost: 1000, multiplier: 1.5, type: 'price', purchased: false },
                { id: 5, name: 'Michelin Training', cost: 5000, multiplier: 2, type: 'price', purchased: false },
                { id: 6, name: 'Reduce Waste', cost: 250, multiplier: 0.8, type: 'cost', purchased: false },
                { id: 7, name: 'Efficient Kitchen', cost: 750, multiplier: 0.7, type: 'cost', purchased: false },
                { id: 8, name: 'Chef Automation', cost: 3000, multiplier: 0.6, type: 'cost', purchased: false }
            ],
            buildings: [
                { id: 1, name: 'Small Diner', cost: 500, incomePerSec: 1, owned: 0 },
                { id: 2, name: 'Medium Restaurant', cost: 2000, incomePerSec: 3, owned: 0 },
                { id: 3, name: 'Large Restaurant', cost: 5000, incomePerSec: 7, owned: 0 },
                { id: 4, name: 'Fine Dining', cost: 15000, incomePerSec: 15, owned: 0 },
                { id: 5, name: 'Michelin Star', cost: 50000, incomePerSec: 50, owned: 0 }
            ],
            priceMultiplier: 1,
            costMultiplier: 1
        };

        // Initialize Game
        function init() {
            renderDishes();
            renderUpgrades();
            renderBuildings();
            updateDisplay();
            setupEventListeners();
            loadGame();
            
            // Customer arrival system
            setInterval(() => {
                if (gameState.customers.length < 5 + gameState.buildings.reduce((sum, b) => sum + b.owned, 0)) {
                    addCustomer();
                }
            }, 3000);

            // Auto-income from buildings
            setInterval(() => {
                const totalIncome = gameState.buildings.reduce((sum, b) => sum + (b.incomePerSec * b.owned), 0);
                if (totalIncome > 0) {
                    gameState.money += totalIncome;
                    gameState.totalEarned += totalIncome;
                    updateDisplay();
                }
            }, 1000);

            // Update customers wait time
            setInterval(() => {
                gameState.customers.forEach(customer => {
                    customer.waitTime++;
                });
                renderCustomers();
            }, 1000);
        }

        function setupEventListeners() {
            document.getElementById('unlock-recipe-btn').addEventListener('click', unlockRecipe);
            document.getElementById('save-btn').addEventListener('click', saveGame);
            document.getElementById('load-btn').addEventListener('click', loadGame);
        }

        function addCustomer() {
            const randomDish = gameState.dishes.filter(d => d.unlockedAt <= gameState.level)[Math.floor(Math.random() * gameState.dishes.filter(d => d.unlockedAt <= gameState.level).length)];
            const randomName = gameState.customerNames[Math.floor(Math.random() * gameState.customerNames.length)];
            
            gameState.customers.push({
                id: Math.random(),
                name: randomName,
                order: randomDish,
                waitTime: 0,
                patience: 30 + (gameState.level * 5)
            });
            
            renderCustomers();
        }

        function renderCustomers() {
            const customersList = document.getElementById('customers-list');
            customersList.innerHTML = '';
            
            // Remove impatient customers
            gameState.customers = gameState.customers.filter(c => c.waitTime < c.patience);

            gameState.customers.forEach(customer => {
                const patienceBar = Math.floor((customer.waitTime / customer.patience) * 100);
                const customerEl = document.createElement('div');
                customerEl.className = 'customer';
                
                customerEl.innerHTML = `
                    <div class="customer-info">
                        <div class="customer-name">${customer.name}</div>
                        <div class="customer-order">Wants: ${customer.order.emoji} ${customer.order.name}</div>
                        <div class="customer-wait">Wait: ${customer.waitTime}s / ${customer.patience}s</div>
                        <div style="background: #ddd; height: 4px; border-radius: 2px; margin-top: 5px;">
                            <div style="background: ${patienceBar > 70 ? '#e74c3c' : '#f39c12'}; height: 100%; width: ${patienceBar}%; border-radius: 2px;"></div>
                        </div>
                    </div>
                    <button class="serve-btn" onclick="window.serveCustomer(${gameState.customers.indexOf(customer)})">
                        Serve
                    </button>
                `;
                customersList.appendChild(customerEl);
            });

            document.getElementById('waiting-customers').textContent = gameState.customers.length;
        }

        window.serveCustomer = function(index) {
            const customer = gameState.customers[index];
            const dish = customer.order;
            const price = Math.floor(dish.basePrice * gameState.priceMultiplier);
            const cost = Math.floor(dish.baseCost * gameState.costMultiplier);
            
            if (gameState.money >= cost) {
                gameState.money -= cost;
                gameState.money += price;
                gameState.totalEarned += (price - cost);
                gameState.dishesCookedCount++;
                gameState.customersSatisfied++;

                const tip = customer.waitTime > 20 ? Math.floor((price - cost) * 0.3) : Math.floor((price - cost) * 0.5);
                gameState.money += tip;
                gameState.totalEarned += tip;

                showProfitIndicator(price - cost + tip);
                showNotification(`${customer.name} says Thank You! +$${price - cost + tip} (with tip)`);
                
                gameState.customers.splice(index, 1);
                renderCustomers();
                updateDisplay();
            } else {
                showNotification('Not enough money!', 'error');
            }
        };

        function renderDishes() {
            const dishList = document.getElementById('dish-list');
            dishList.innerHTML = '';
            
            gameState.dishes.forEach(dish => {
                if (dish.unlockedAt <= gameState.level) {
                    const price = Math.floor(dish.basePrice * gameState.priceMultiplier);
                    const cost = Math.floor(dish.baseCost * gameState.costMultiplier);
                    const profit = price - cost;

                    const dishEl = document.createElement('div');
                    dishEl.className = 'dish';
                    dishEl.innerHTML = `
                        <div class="dish-emoji">${dish.emoji}</div>
                        <div class="dish-name">${dish.name}</div>
                        <div class="dish-profit">+$${profit}</div>
                    `;
                    dishEl.addEventListener('click', () => cookDish(dish, price, cost));
                    dishList.appendChild(dishEl);
                }
            });
        }

        function cookDish(dish, price, cost) {
            if (gameState.money >= cost) {
                gameState.money -= cost;
                gameState.money += price;
                gameState.totalEarned += (price - cost);
                gameState.dishesCookedCount++;
                
                document.getElementById('cooking-display').textContent = dish.emoji;
                document.getElementById('current-dish-display').textContent = `Cooked ${dish.name}!`;
                
                showProfitIndicator(price - cost);
                showNotification(`Cooked ${dish.emoji} ${dish.name}! +$${price - cost}`);
                updateDisplay();

                setTimeout(() => {
                    document.getElementById('cooking-display').textContent = '🍽️';
                    document.getElementById('current-dish-display').textContent = 'Click a dish to cook!';
                }, 800);
            } else {
                showNotification('Not enough money!', 'error');
            }
        }

        function renderUpgrades() {
            const upgradesList = document.getElementById('upgrades-list');
            upgradesList.innerHTML = '';

            gameState.upgrades.forEach(upgrade => {
                const upgradeEl = document.createElement('div');
                upgradeEl.className = `upgrade-item ${upgrade.purchased ? 'purchased' : ''}`;
                
                const effect = upgrade.type === 'price' 
                    ? `📈 Price ×${upgrade.multiplier}` 
                    : `📉 Cost ×${upgrade.multiplier}`;
                
                upgradeEl.innerHTML = `
                    <div class="upgrade-name">${upgrade.name}</div>
                    <div class="upgrade-cost">${upgrade.purchased ? '✓ Owned' : `$${upgrade.cost}`}</div>
                    <div class="upgrade-effect">${effect}</div>
                `;

                if (!upgrade.purchased) {
                    upgradeEl.addEventListener('click', () => purchaseUpgrade(upgrade));
                    upgradeEl.style.cursor = 'pointer';
                }
                upgradesList.appendChild(upgradeEl);
            });
        }

        function purchaseUpgrade(upgrade) {
            if (gameState.money >= upgrade.cost && !upgrade.purchased) {
                gameState.money -= upgrade.cost;
                upgrade.purchased = true;

                if (upgrade.type === 'price') {
                    gameState.priceMultiplier *= upgrade.multiplier;
                } else {
                    gameState.costMultiplier *= upgrade.multiplier;
                }

                showNotification(`✓ Purchased ${upgrade.name}!`);
                renderDishes();
                renderUpgrades();
                updateDisplay();
            } else if (upgrade.purchased) {
                showNotification('Already owned!', 'error');
            } else {
                showNotification('Not enough money!', 'error');
            }
        }

        function renderBuildings() {
            const buildingsList = document.getElementById('buildings-list');
            buildingsList.innerHTML = '';

            gameState.buildings.forEach(building => {
                const buildingEl = document.createElement('div');
                buildingEl.className = `building ${building.owned > 0 ? 'owned' : ''}`;
                
                buildingEl.innerHTML = `
                    <div class="building-name">${building.name}</div>
                    <div class="building-info">+$${building.incomePerSec}/sec</div>
                    <div class="building-cost">Cost: $${building.cost}</div>
                    ${building.owned > 0 ? `<div class="building-owned">Owned: ${building.owned}</div>` : ''}
                `;

                buildingEl.addEventListener('click', () => purchaseBuilding(building));
                buildingEl.style.cursor = 'pointer';
                buildingsList.appendChild(buildingEl);
            });
        }

        function purchaseBuilding(building) {
            if (gameState.money >= building.cost) {
                gameState.money -= building.cost;
                building.owned++;
                showNotification(`🏢 Built ${building.name}!`);
                renderBuildings();
                updateDisplay();
            } else {
                showNotification('Not enough money!', 'error');
            }
        }

        function unlockRecipe() {
            gameState.level++;
            showNotification(`📈 LEVEL UP to ${gameState.level}! New recipes unlocked!`);
            renderDishes();
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('money').textContent = gameState.money.toFixed(0);
            document.getElementById('level').textContent = gameState.level;
            
            const totalIncome = gameState.buildings.reduce((sum, b) => sum + (b.incomePerSec * b.owned), 0);
            document.getElementById('income-per-sec').textContent = totalIncome.toFixed(0);
        }

        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            notification.style.background = type === 'error' ? '#e74c3c' : '#27ae60';
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 2500);
        }

        function showProfitIndicator(profit) {
            const indicator = document.createElement('div');
            indicator.className = 'profit-indicator';
            indicator.textContent = `+$${profit}`;
            indicator.style.color = '#27ae60';
            indicator.style.left = Math.random() * 80 + 10 + '%';
            indicator.style.top = '50%';
            document.body.appendChild(indicator);
            
            setTimeout(() => indicator.remove(), 1500);
        }

        function saveGame() {
            localStorage.setItem('cookingTycoonSave', JSON.stringify(gameState));
            showNotification('Game saved successfully! 💾');
        }

        function loadGame() {
            const saved = localStorage.getItem('cookingTycoonSave');
            if (saved) {
                const loadedState = JSON.parse(saved);
                Object.assign(gameState, loadedState);
                renderDishes();
                renderUpgrades();
                renderBuildings();
                renderCustomers();
                updateDisplay();
                showNotification('Game loaded! 📂');
            }
        }

        // Start the game
        init();
    </script>
</body>
</html>
