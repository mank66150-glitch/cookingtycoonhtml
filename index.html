<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooking Tycoon - Restaurant Empire</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: linear-gradient(180deg, #FFF8DC 0%, #FFEAA7 100%);
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            border: 8px solid #FF6B6B;
        }

        header {
            background: linear-gradient(135deg, #FF8C69 0%, #FF6B6B 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid #FFB347;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200"><defs><pattern id="p" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="50" cy="50" r="30" fill="rgba(255,255,255,0.1)"/></pattern></defs><rect width="1200" height="200" fill="url(%23p)"/></svg>');
            opacity: 0.3;
        }

        header h1 {
            font-size: 3.5em;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.3);
            font-weight: bold;
            position: relative;
            z-index: 2;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .header-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
            position: relative;
            z-index: 2;
        }

        .stat {
            font-size: 1.1em;
            background: rgba(255,255,255,0.3);
            padding: 12px 18px;
            border-radius: 12px;
            border: 3px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transform: perspective(1000px) rotateY(0deg);
        }

        .stat-label {
            opacity: 0.95;
            font-size: 0.85em;
            font-weight: bold;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.5em;
            margin-top: 5px;
            color: #FFD700;
        }

        main {
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            gap: 15px;
            padding: 15px;
        }

        .kitchen-area {
            grid-column: 1;
            grid-row: 1 / 3;
        }

        .section {
            background: linear-gradient(135deg, #FFF8DC 0%, #FFEAA7 100%);
            border: 5px solid #FF6B6B;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }

        .section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .section h2 {
            color: #FF6B6B;
            margin-bottom: 15px;
            font-size: 2em;
            border-bottom: 4px solid #FFB347;
            padding-bottom: 10px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1;
        }

        .kitchen-station {
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            border: 5px solid #654321;
            border-radius: 15px;
            padding: 25px;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .kitchen-station::before {
            content: '🔥';
            position: absolute;
            font-size: 150px;
            opacity: 0.08;
            top: -30px;
            right: -30px;
        }

        .cooking-display {
            font-size: 120px;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            animation: pulse 0.6s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .current-dish-display {
            font-size: 1.8em;
            margin: 15px 0;
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 12px;
            min-width: 250px;
            border: 2px dashed white;
        }

        .money-gained {
            font-size: 2.5em;
            color: #FFD700;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .dish-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .dish {
            background: linear-gradient(135deg, #FFE4B5 0%, #FFD699 100%);
            border: 4px solid #FF8C69;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }

        .dish::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .dish:hover::before {
            left: 100%;
        }

        .dish:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 12px 24px rgba(0,0,0,0.25);
            border-color: #FF6B6B;
            background: linear-gradient(135deg, #FFEAA7 0%, #FFD699 100%);
        }

        .dish:active {
            transform: translateY(-3px) scale(0.95);
        }

        .dish-emoji {
            font-size: 3.5em;
            margin: 5px 0;
            display: block;
        }

        .dish-name {
            font-weight: bold;
            font-size: 1.05em;
            color: #333;
            margin-bottom: 5px;
        }

        .dish-profit {
            color: #27ae60;
            font-size: 0.95em;
            font-weight: bold;
        }

        .customers-section {
            background: linear-gradient(135deg, #90EE90 0%, #98FB98 100%);
            border: 5px solid #228B22;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        .customers-section h3 {
            color: #228B22;
            margin-bottom: 12px;
            font-size: 1.5em;
            font-weight: bold;
        }

        .customer {
            background: white;
            border: 3px solid #228B22;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .customer-info {
            flex: 1;
        }

        .customer-name {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 1.05em;
            color: #228B22;
        }

        .customer-order {
            font-size: 0.9em;
            color: #333;
            margin-bottom: 5px;
        }

        .customer-wait {
            font-size: 0.8em;
            color: #666;
        }

        .serve-btn {
            background: linear-gradient(135deg, #228B22 0%, #006400 100%);
            color: white;
            border: 3px solid white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
            transition: all 0.2s ease;
            font-size: 0.95em;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .serve-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .serve-btn:active {
            transform: scale(0.95);
        }

        .serve-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .upgrades-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .upgrade-item {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: 4px solid #FF8C00;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }

        .upgrade-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.25);
        }

        .upgrade-item.purchased {
            background: linear-gradient(135deg, #90EE90 0%, #98FB98 100%);
            border-color: #228B22;
        }

        .upgrade-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
            font-size: 1em;
        }

        .upgrade-cost {
            color: #8B0000;
            font-size: 0.9em;
            font-weight: bold;
        }

        .upgrade-status {
            color: #228B22;
            font-size: 0.85em;
            font-weight: bold;
            margin-top: 3px;
        }

        .building {
            background: linear-gradient(135deg, #87CEEB 0%, #4DA6D6 100%);
            border: 4px solid #1E90FF;
            padding: 12px;
            border-radius: 10px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            position: relative;
            z-index: 1;
        }

        .building:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.25);
        }

        .building.owned {
            background: linear-gradient(135deg, #90EE90 0%, #98FB98 100%);
            border-color: #228B22;
        }

        .building-name {
            font-weight: bold;
            font-size: 1.05em;
            color: #333;
            margin-bottom: 5px;
        }

        .building-info {
            font-size: 0.85em;
            color: #333;
            margin: 3px 0;
        }

        .building-cost {
            color: #8B0000;
            font-weight: bold;
            margin-top: 5px;
            font-size: 0.9em;
        }

        .building-owned {
            color: #228B22;
            font-weight: bold;
            margin-top: 3px;
            font-size: 0.9em;
        }

        .right-panel {
            display: grid;
            grid-template-rows: auto auto;
            gap: 15px;
        }

        .footer {
            background: linear-gradient(135deg, #FF8C69 0%, #FF6B6B 100%);
            padding: 12px 20px;
            text-align: center;
            border-top: 5px solid #FFB347;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .save-btn, .load-btn {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #333;
            border: 3px solid white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            font-size: 1em;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .save-btn:hover, .load-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #333;
            padding: 15px 25px;
            border-radius: 12px;
            animation: slideInRight 0.3s ease;
            z-index: 1000;
            font-weight: bold;
            border: 3px solid white;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            font-size: 1.1em;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(400px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .profit-indicator {
            position: fixed;
            pointer-events: none;
            font-weight: bold;
            font-size: 2em;
            animation: floatUp 1.5s ease forwards;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px);
            }
        }

        .unlock-btn {
            background: linear-gradient(135deg, #9C27B0 0%, #7B1FA2 100%);
            color: white;
            border: 4px solid white;
            padding: 15px 25px;
            font-size: 1.1em;
            width: 100%;
            margin-top: 15px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .unlock-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        @media (max-width: 1024px) {
            main {
                grid-template-columns: 1fr;
            }

            .kitchen-area {
                grid-column: 1;
                grid-row: auto;
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2.2em;
            }

            .kitchen-station {
                min-height: 250px;
            }

            .cooking-display {
                font-size: 80px;
            }

            .dish-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍳 COOKING TYCOON 🍳</h1>
            <p style="font-size: 1.3em; margin-bottom: 15px; font-weight: bold;">💰 Build Your Restaurant Empire & Get RICH! 💰</p>
            <div class="header-stats">
                <div class="stat">
                    <div class="stat-label">💰 MONEY</div>
                    <div class="stat-value">$<span id="money">0</span></div>
                </div>
                <div class="stat">
                    <div class="stat-label">⭐ LEVEL</div>
                    <div class="stat-value"><span id="level">1</span></div>
                </div>
                <div class="stat">
                    <div class="stat-label">👥 WAITING</div>
                    <div class="stat-value"><span id="waiting-customers">0</span></div>
                </div>
                <div class="stat">
                    <div class="stat-label">💵 INCOME/SEC</div>
                    <div class="stat-value">$<span id="income-per-sec">0</span></div>
                </div>
            </div>
        </header>

        <main>
            <div class="kitchen-area">
                <section class="section">
                    <h2>👨‍🍳 COOKING STATION</h2>
                    <div class="kitchen-station">
                        <div class="cooking-display" id="cooking-display">🍽️</div>
                        <div class="current-dish-display" id="current-dish-display">👉 Click a dish to cook! 👈</div>
                        <div class="money-gained" id="money-gained"></div>
                    </div>
                    <div class="dish-grid" id="dish-list"></div>
                    <button id="unlock-recipe-btn" class="unlock-btn serve-btn">
                        📚 UNLOCK NEW RECIPE - Level Up!
                    </button>
                </section>

                <section class="section customers-section">
                    <h3>👥 WAITING CUSTOMERS - SERVE THEM!</h3>
                    <div id="customers-list" style="max-height: 280px; overflow-y: auto;"></div>
                </section>
            </div>

            <div class="right-panel">
                <section class="section">
                    <h2>⚡ UPGRADES 📈</h2>
                    <div class="upgrades-grid" id="upgrades-list"></div>
                </section>

                <section class="section">
                    <h2>🏢 BUILD RESTAURANTS</h2>
                    <div id="buildings-list"></div>
                </section>
            </div>
        </main>

        <div class="footer">
            <button class="save-btn" id="save-btn">💾 SAVE GAME</button>
            <button class="load-btn" id="load-btn">📂 LOAD GAME</button>
        </div>
    </div>

    <script>
        // Game State
        const gameState = {
            money: 100,
            level: 1,
            totalEarned: 100,
            dishesCookedCount: 0,
            customersSatisfied: 0,
            dishes: [
                { id: 1, name: 'Burger', emoji: '🍔', basePrice: 15, baseCost: 4, unlockedAt: 1 },
                { id: 2, name: 'Pizza', emoji: '🍕', basePrice: 20, baseCost: 6, unlockedAt: 2 },
                { id: 3, name: 'Ramen', emoji: '🍜', basePrice: 25, baseCost: 7, unlockedAt: 3 },
                { id: 4, name: 'Steak', emoji: '🥩', basePrice: 40, baseCost: 12, unlockedAt: 4 },
                { id: 5, name: 'Sushi', emoji: '🍣', basePrice: 50, baseCost: 15, unlockedAt: 5 },
                { id: 6, name: 'Lobster', emoji: '🦞', basePrice: 80, baseCost: 20, unlockedAt: 6 },
                { id: 7, name: 'Haute Cuisine', emoji: '🍽️', basePrice: 150, baseCost: 40, unlockedAt: 7 },
                { id: 8, name: 'Golden Dish', emoji: '✨', basePrice: 250, baseCost: 60, unlockedAt: 8 }
            ],
            customers: [],
            customerNames: ['👨 Alex', '👩 Emma', '👨 Jake', '👩 Sofia', '👨 Marco', '👩 Lily', '👨 Tom', '👩 Sarah', '👨 Chris', '👩 Anna', '👨 Mike', '👩 Lisa'],
            upgrades: [
                { id: 1, name: '🔪 Better Oven', cost: 200, multiplier: 1.3, type: 'price', purchased: false },
                { id: 2, name: '⚡ Fast Hands', cost: 400, multiplier: 1.4, type: 'price', purchased: false },
                { id: 3, name: '🌶️ Spice Master', cost: 800, multiplier: 1.5, type: 'price', purchased: false },
                { id: 4, name: '🥘 Premium Ingredients', cost: 1500, multiplier: 1.7, type: 'price', purchased: false },
                { id: 5, name: '👨‍⚖️ Michelin Training', cost: 5000, multiplier: 2.2, type: 'price', purchased: false },
                { id: 6, name: '♻️ Reduce Waste', cost: 300, multiplier: 0.7, type: 'cost', purchased: false },
                { id: 7, name: '🤖 Efficient Kitchen', cost: 900, multiplier: 0.6, type: 'cost', purchased: false },
                { id: 8, name: '🔬 Chef Automation', cost: 3500, multiplier: 0.5, type: 'cost', purchased: false }
            ],
            buildings: [
                { id: 1, name: '🍔 Food Cart', cost: 500, incomePerSec: 2, owned: 0 },
                { id: 2, name: '🏪 Small Diner', cost: 2000, incomePerSec: 5, owned: 0 },
                { id: 3, name: '🏢 Medium Restaurant', cost: 8000, incomePerSec: 12, owned: 0 },
                { id: 4, name: '🏰 Fine Dining', cost: 25000, incomePerSec: 30, owned: 0 },
                { id: 5, name: '👑 Michelin Star', cost: 100000, incomePerSec: 100, owned: 0 }
            ],
            priceMultiplier: 1,
            costMultiplier: 1
        };

        // Initialize Game
        function init() {
            renderDishes();
            renderUpgrades();
            renderBuildings();
            updateDisplay();
            setupEventListeners();
            loadGame();
            
            // Customer arrival system - MORE CUSTOMERS!
            setInterval(() => {
                const maxCustomers = 6 + gameState.buildings.reduce((sum, b) => sum + (b.owned * 2), 0);
                if (gameState.customers.length < maxCustomers) {
                    addCustomer();
                }
            }, 2500);

            // Auto-income from buildings
            setInterval(() => {
                const totalIncome = gameState.buildings.reduce((sum, b) => sum + (b.incomePerSec * b.owned), 0);
                if (totalIncome > 0) {
                    gameState.money += totalIncome;
                    gameState.totalEarned += totalIncome;
                    showNotification(`+$${totalIncome} from restaurants!`, 'income');
                    updateDisplay();
                }
            }, 1000);

            // Update customers wait time
            setInterval(() => {
                gameState.customers.forEach(customer => {
                    customer.waitTime++;
                });
                renderCustomers();
            }, 1000);
        }

        function setupEventListeners() {
            document.getElementById('unlock-recipe-btn').addEventListener('click', unlockRecipe);
            document.getElementById('save-btn').addEventListener('click', saveGame);
            document.getElementById('load-btn').addEventListener('click', loadGame);
        }

        function addCustomer() {
            const unlockedDishes = gameState.dishes.filter(d => d.unlockedAt <= gameState.level);
            if (unlockedDishes.length === 0) return;
            
            const randomDish = unlockedDishes[Math.floor(Math.random() * unlockedDishes.length)];
            const randomName = gameState.customerNames[Math.floor(Math.random() * gameState.customerNames.length)];
            
            gameState.customers.push({
                id: Math.random(),
                name: randomName,
                order: randomDish,
                waitTime: 0,
                patience: 45 + (gameState.level * 5)
            });
            
            renderCustomers();
        }

        function renderCustomers() {
            const customersList = document.getElementById('customers-list');
            customersList.innerHTML = '';
            
            // Remove impatient customers
            gameState.customers = gameState.customers.filter(c => c.waitTime < c.patience);

            if (gameState.customers.length === 0) {
                customersList.innerHTML = '<div style="text-align: center; padding: 20px; color: #999;">No customers waiting...</div>';
                return;
            }

            gameState.customers.forEach((customer, index) => {
                const patienceBar = Math.floor((customer.waitTime / customer.patience) * 100);
                const customerEl = document.createElement('div');
                customerEl.className = 'customer';
                
                customerEl.innerHTML = `
                    <div class="customer-info">
                        <div class="customer-name">${customer.name}</div>
                        <div class="customer-order">Wants: ${customer.order.emoji} ${customer.order.name}</div>
                        <div class="customer-wait">Wait: ${customer.waitTime}s</div>
                        <div style="background: #ddd; height: 6px; border-radius: 3px; margin-top: 5px;">
                            <div style="background: ${patienceBar > 80 ? '#e74c3c' : patienceBar > 50 ? '#f39c12' : '#27ae60'}; height: 100%; width: ${patienceBar}%; border-radius: 3px; transition: width 0.1s;"></div>
                        </div>
                    </div>
                    <button class="serve-btn" onclick="window.serveCustomer(${index})">
                        💰 SERVE
                    </button>
                `;
                customersList.appendChild(customerEl);
            });

            document.getElementById('waiting-customers').textContent = gameState.customers.length;
        }

        window.serveCustomer = function(index) {
            const customer = gameState.customers[index];
            const dish = customer.order;
            const price = Math.floor(dish.basePrice * gameState.priceMultiplier);
            const cost = Math.floor(dish.baseCost * gameState.costMultiplier);
            
            if (gameState.money >= cost) {
                gameState.money -= cost;
                gameState.money += price;
                gameState.totalEarned += (price - cost);
                gameState.dishesCookedCount++;
                gameState.customersSatisfied++;

                // Better tip system
                let tip = 0;
                if (customer.waitTime <= 10) {
                    tip = Math.floor((price - cost) * 1.5);
                } else if (customer.waitTime <= 20) {
                    tip = Math.floor((price - cost) * 1);
                } else if (customer.waitTime <= 35) {
                    tip = Math.floor((price - cost) * 0.5);
                } else {
                    tip = Math.floor((price - cost) * 0.2);
                }
                
                gameState.money += tip;
                gameState.totalEarned += tip;

                const totalGain = price - cost + tip;
                showProfitIndicator(totalGain);
                showNotification(`${customer.name} paid $${totalGain}! 💰`, 'success');
                
                gameState.customers.splice(index, 1);
                renderCustomers();
                updateDisplay();
            } else {
                showNotification('Not enough money!', 'error');
            }
        };

        function renderDishes() {
            const dishList = document.getElementById('dish-list');
            dishList.innerHTML = '';
            
            gameState.dishes.forEach(dish => {
                if (dish.unlockedAt <= gameState.level) {
                    const price = Math.floor(dish.basePrice * gameState.priceMultiplier);
                    const cost = Math.floor(dish.baseCost * gameState.costMultiplier);
                    const profit = price - cost;

                    const dishEl = document.createElement('div');
                    dishEl.className = 'dish';
                    dishEl.innerHTML = `
                        <div class="dish-emoji">${dish.emoji}</div>
                        <div class="dish-name">${dish.name}</div>
                        <div class="dish-profit">+$${profit}</div>
                    `;
                    dishEl.addEventListener('click', () => cookDish(dish, price, cost));
                    dishList.appendChild(dishEl);
                }
            });
        }

        function cookDish(dish, price, cost) {
            if (gameState.money >= cost) {
                gameState.money -= cost;
                gameState.money += price;
                gameState.totalEarned += (price - cost);
                gameState.dishesCookedCount++;
                
                document.getElementById('cooking-display').textContent = dish.emoji;
                document.getElementById('current-dish-display').textContent = `🔥 Cooking ${dish.name}! 🔥`;
                document.getElementById('money-gained').textContent = `+$${price - cost}`;
                
                showProfitIndicator(price - cost);
                showNotification(`Cooked ${dish.emoji} ${dish.name}! +$${price - cost}`, 'success');
                updateDisplay();

                setTimeout(() => {
                    document.getElementById('cooking-display').textContent = '🍽️';
                    document.getElementById('current-dish-display').textContent = '👉 Click a dish to cook! 👈';
                    document.getElementById('money-gained').textContent = '';
                }, 1000);
            } else {
                showNotification('Not enough money to cook!', 'error');
            }
        }

        function renderUpgrades() {
            const upgradesList = document.getElementById('upgrades-list');
            upgradesList.innerHTML = '';

            gameState.upgrades.forEach(upgrade => {
                const upgradeEl = document.createElement('div');
                upgradeEl.className = `upgrade-item ${upgrade.purchased ? 'purchased' : ''}`;
                
                const effect = upgrade.type === 'price' 
                    ? `📈 Prices ×${upgrade.multiplier.toFixed(1)}` 
                    : `📉 Costs ×${upgrade.multiplier.toFixed(1)}`;
                
                upgradeEl.innerHTML = `
                    <div class="upgrade-name">${upgrade.name}</div>
                    <div class="upgrade-cost">${upgrade.purchased ? '✅ OWNED' : `$${upgrade.cost}`}</div>
                    <div class="upgrade-effect" style="color: #333; font-size: 0.85em; margin-top: 3px;">${effect}</div>
                `;

                if (!upgrade.purchased) {
                    upgradeEl.addEventListener('click', () => purchaseUpgrade(upgrade));
                    upgradeEl.style.cursor = 'pointer';
                }
                upgradesList.appendChild(upgradeEl);
            });
        }

        function purchaseUpgrade(upgrade) {
            if (gameState.money >= upgrade.cost && !upgrade.purchased) {
                gameState.money -= upgrade.cost;
                upgrade.purchased = true;

                if (upgrade.type === 'price') {
                    gameState.priceMultiplier *= upgrade.multiplier;
                } else {
                    gameState.costMultiplier *= upgrade.multiplier;
                }

                showNotification(`✅ Purchased ${upgrade.name}!`, 'success');
                renderDishes();
                renderUpgrades();
                updateDisplay();
            } else if (upgrade.purchased) {
                showNotification('Already owned!', 'error');
            } else {
                showNotification('Not enough money!', 'error');
            }
        }

        function renderBuildings() {
            const buildingsList = document.getElementById('buildings-list');
            buildingsList.innerHTML = '';

            gameState.buildings.forEach(building => {
                const buildingEl = document.createElement('div');
                buildingEl.className = `building ${building.owned > 0 ? 'owned' : ''}`;
                
                buildingEl.innerHTML = `
                    <div class="building-name">${building.name}</div>
                    <div class="building-info">💰 +$${building.incomePerSec}/sec</div>
                    <div class="building-cost">Cost: $${building.cost}</div>
                    ${building.owned > 0 ? `<div class="building-owned">✅ Owned: ${building.owned}</div>` : ''}
                `;

                buildingEl.addEventListener('click', () => purchaseBuilding(building));
                buildingEl.style.cursor = 'pointer';
                buildingsList.appendChild(buildingEl);
            });
        }

        function purchaseBuilding(building) {
            if (gameState.money >= building.cost) {
                gameState.money -= building.cost;
                building.owned++;
                showNotification(`🏢 Built ${building.name}!`, 'success');
                renderBuildings();
                updateDisplay();
            } else {
                showNotification('Not enough money!', 'error');
            }
        }

        function unlockRecipe() {
            gameState.level++;
            showNotification(`🎉 LEVEL UP to ${gameState.level}! New recipes unlocked! 🎉`, 'success');
            renderDishes();
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('money').textContent = gameState.money.toFixed(0);
            document.getElementById('level').textContent = gameState.level;
            
            const totalIncome = gameState.buildings.reduce((sum, b) => sum + (b.incomePerSec * b.owned), 0);
            document.getElementById('income-per-sec').textContent = totalIncome.toFixed(0);
        }

        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            if (type === 'error') {
                notification.style.background = 'linear-gradient(135deg, #e74c3c 0%, #c0392b 100%)';
                notification.style.color = 'white';
            } else if (type === 'income') {
                notification.style.background = 'linear-gradient(135deg, #27ae60 0%, #229954 100%)';
                notification.style.color = 'white';
            }
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 2500);
        }

        function showProfitIndicator(profit) {
            const indicator = document.createElement('div');
            indicator.className = 'profit-indicator';
            indicator.textContent = `+$${profit}`;
            indicator.style.color = '#FFD700';
            indicator.style.left = Math.random() * 80 + 10 + '%';
            indicator.style.top = '50%';
            document.body.appendChild(indicator);
            
            setTimeout(() => indicator.remove(), 1500);
        }

        function saveGame() {
            localStorage.setItem('cookingTycoonSave', JSON.stringify(gameState));
            showNotification('💾 Game saved successfully!', 'success');
        }

        function loadGame() {
            const saved = localStorage.getItem('cookingTycoonSave');
            if (saved) {
                const loadedState = JSON.parse(saved);
                Object.assign(gameState, loadedState);
                renderDishes();
                renderUpgrades();
                renderBuildings();
                renderCustomers();
                updateDisplay();
                showNotification('📂 Game loaded!', 'success');
            }
        }

        // Start the game
        init();
    </script>
</body>
</html>
